name: Publish to TestPyPI

# Pre-release dress rehearsal. Tagging a release candidate or dev build
# (v*rc*, v*dev*) publishes to TestPyPI instead of the real index, so you can
# exercise the whole OIDC publish flow without burning a real version number
# (PyPI never lets you re-upload a version). Same Trusted Publishing model as
# publish.yml — needs its own one-time trusted-publisher config on test.pypi.org
# with environment `testpypi`. See docs/PUBLISHING.md.
#
# Examples that trigger this:  v0.4.0rc1   v0.4.0.dev1
# (a plain v0.4.0 tag goes to real PyPI via publish.yml instead.)

on:
  push:
    tags:
      - "v*rc*"
      - "v*dev*"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  test:
    name: Test before release
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check scripts tests

      - name: Run tests
        run: pytest

  build:
    name: Build distributions
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Check distribution metadata
        run: twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment:
      name: testpypi
      url: https://test.pypi.org/project/eidetic-os/
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
