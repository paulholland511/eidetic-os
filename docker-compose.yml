# Eidetic OS — run the `eidetic` CLI tools in a container.
#
# This compose file shows how to drive the pipeline scripts without installing
# anything on the host. It mounts your markdown vault read-write and loads your
# secrets from a local .env (never commit that file).
#
#   1. cp .env.example .env   &&   edit it
#   2. Point the bind mount below at your real vault path
#   3. docker compose run --rm eidetic doctor
#      docker compose run --rm eidetic health
#      docker compose run --rm eidetic embed --full
#      docker compose run --rm eidetic commit --dry-run
#
# A local LLM (LM Studio / Ollama) running on the host is reachable from inside
# the container at `host.docker.internal`. Set EMBED_HOST=host.docker.internal
# (and LM_STUDIO_HOST=host.docker.internal) in your .env so RAG/trading work.

services:
  eidetic:
    build:
      context: .
      args:
        # Use ".[all]" to bake in the optional trading + pdf extras.
        EXTRAS: "."
    image: eidetic-os
    # Secrets and config come from your local .env (git-ignored). Marked optional
    # so the container still runs before you've created one — values can also come
    # from your shell or `-e` flags.
    env_file:
      - path: .env
        required: false
    environment:
      # The vault is mounted at /vault below — override whatever .env says.
      VAULT_PATH: /vault
    volumes:
      # ← change the host path to your real vault. It must be a directory your
      # Docker engine shares with its VM — paths under your home directory are
      # safest (Docker Desktop shares $HOME; colima shares $HOME but not the
      # macOS /tmp/$TMPDIR). A path the VM can't see shows up empty inside the
      # container.
      - "${VAULT_PATH:-./vault}:/vault"
    # On Linux, uncomment so host.docker.internal resolves to the host LLM:
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"
    # No long-running process — this is a CLI. Override the command per run:
    #   docker compose run --rm eidetic <command>
    command: ["doctor"]
